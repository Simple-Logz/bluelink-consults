<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />

  <!-- Mobile -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <!-- Primary SEO -->
  <title>
    BlueLink Consult | Cloud Modernization, DevOps & Application Transformation
  </title>

  <meta
    name="description"
    content="BlueLink Consult helps businesses modernize legacy applications, migrate to the cloud, improve DevOps automation, strengthen security, and optimize infrastructure for scalability and reliability."
  />

  <meta
    name="keywords"
    content="cloud modernization, DevOps consulting, Azure consulting, AWS consulting, application modernization, Kubernetes, CI/CD, infrastructure automation, cloud migration, security, identity management"
  />

  <meta name="author" content="BlueLink Consult" />

  <!-- Canonical -->
  <link rel="canonical" href="https://www.bluelinkconsults.com/" />

  <!-- Open Graph -->
  <meta property="og:type" content="website" />
  <meta property="og:title" content="BlueLink Consult" />
  <meta
    property="og:description"
    content="Helping businesses modernize applications, cloud infrastructure, DevOps pipelines, and security operations."
  />
  <meta property="og:url" content="https://www.bluelinkconsults.com/" />

  <!-- IMPORTANT: Replace with your actual image -->
  <meta
    property="og:image"
    content="https://www.bluelinkconsults.com/og-image.png"
  />

  <!-- Twitter -->
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="BlueLink Consult" />
  <meta
    name="twitter:description"
    content="Cloud modernization, DevOps automation, security, and application transformation services."
  />

  <meta
    name="twitter:image"
    content="https://www.bluelinkconsults.com/og-image.png"
  />

  <!-- Theme -->
  <meta name="theme-color" content="#0f172a" />

  <!-- Robots -->
  <meta name="robots" content="index, follow" />

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="/favicon.png" />

  <!-- Structured Data -->
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "Organization",
    "name": "BlueLink Consult",
    "url": "https://www.bluelinkconsults.com",
    "logo": "https://www.bluelinkconsults.com/logo.png",
    "description": "Cloud modernization and application transformation consultancy.",
    "sameAs": []
  }
  </script>
</head>

<body>
  <div id="root"></div>

  <script type="module" src="/src/main.jsx"></script>
</body>
</html>
